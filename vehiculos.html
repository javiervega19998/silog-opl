<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Silog SpA · Vehículos</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"/>
<style>
:root{--primary:#1B4B9B;--accent:#F47920;--bg:#060D1F;--surface:#0D1B35;--surface2:#142040;--text:#E8EEF8;--text2:#8A9DC0;--border:#1E3056;--success:#10B981;--danger:#EF4444;--warning:#F59E0B;}
*{margin:0;padding:0;box-sizing:border-box}body{background:var(--bg);font-family:'Inter',sans-serif;color:var(--text);min-height:100vh}
.nav{background:rgba(13,27,53,.95);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:0 20px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.nav-brand{font-weight:800;font-size:1rem}.nav-brand span{color:var(--accent)}
.nav-right{display:flex;gap:8px;align-items:center}
.btn-back{background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:7px 14px;border-radius:8px;cursor:pointer;font-size:.8rem;font-family:'Inter',sans-serif}
.btn-accent{background:var(--accent);border:none;color:#fff;padding:8px 16px;border-radius:8px;cursor:pointer;font-size:.8rem;font-weight:600;font-family:'Inter',sans-serif}
.main{max-width:900px;margin:0 auto;padding:20px 16px 80px}
.page-header{margin-bottom:20px;display:flex;align-items:center;justify-content:space-between}
.page-header h2{font-size:1.3rem;font-weight:700}
.fleet-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;margin-bottom:24px}
.v-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:18px;transition:.2s}
.v-card:hover{border-color:var(--primary);box-shadow:0 4px 20px rgba(27,75,155,.2)}
.v-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
.v-plate{font-size:1.1rem;font-weight:800;letter-spacing:2px;color:var(--accent)}
.v-model-name{font-size:.8rem;color:var(--text2);margin-top:2px}
.status-pill{padding:4px 12px;border-radius:20px;font-size:.72rem;font-weight:600}
.s-disponible{background:rgba(16,185,129,.15);color:#6EE7B7}
.s-mantencion{background:rgba(245,158,11,.15);color:#FCD34D}
.s-otros{background:rgba(37,99,235,.15);color:#93C5FD}
.v-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.v-stat{text-align:center;background:var(--surface2);border-radius:8px;padding:8px 4px}
.v-stat .val{font-size:.9rem;font-weight:700}
.v-stat .lbl{font-size:.65rem;color:var(--text2);margin-top:2px}
.v-conductor{font-size:.78rem;color:var(--text2);display:flex;align-items:center;gap:6px}
.btn-detail{width:100%;padding:9px;border:1px solid var(--border);background:transparent;color:var(--text2);border-radius:8px;cursor:pointer;font-size:.8rem;font-family:'Inter',sans-serif;margin-top:10px;transition:.2s}
.btn-detail:hover{border-color:var(--primary);color:var(--text)}
/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:none;align-items:center;justify-content:center;padding:16px}
.modal-overlay.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:28px;width:100%;max-width:500px;max-height:90vh;overflow-y:auto}
.modal h3{font-size:1.1rem;font-weight:700;margin-bottom:20px;color:var(--accent)}
.form-row{margin-bottom:12px}.form-row label{display:block;font-size:.75rem;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}
.field{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px 12px;color:var(--text);font-size:.85rem;font-family:'Inter',sans-serif;outline:none}
.field:focus{border-color:var(--primary)}
.row-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.modal-actions{display:flex;gap:10px;margin-top:20px}
.btn-save{flex:1;padding:12px;border:none;border-radius:10px;background:linear-gradient(135deg,var(--primary),#2563EB);color:#fff;font-size:.9rem;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif}
.btn-cancel{flex:1;padding:12px;border:1px solid var(--border);border-radius:10px;background:transparent;color:var(--text2);font-size:.9rem;cursor:pointer;font-family:'Inter',sans-serif}
/* Historial */
.hist-item{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px 12px;margin-bottom:6px}
.hist-item .ev{font-size:.82rem;font-weight:600}.hist-item .dt{font-size:.72rem;color:var(--text2);margin-top:2px}
/* Historial KM Table */
.hist-section-title{font-size:.78rem;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--accent);margin:16px 0 10px;display:flex;align-items:center;gap:6px}
.hist-section-title:first-child{margin-top:0}
.km-table{width:100%;border-collapse:separate;border-spacing:0;font-size:.78rem}
.km-table thead th{background:var(--surface2);color:var(--text2);font-weight:600;text-transform:uppercase;letter-spacing:.5px;font-size:.68rem;padding:8px 10px;text-align:left;border-bottom:2px solid var(--border);position:sticky;top:0}
.km-table thead th:first-child{border-radius:8px 0 0 0}.km-table thead th:last-child{border-radius:0 8px 0 0}
.km-table tbody tr{transition:background .15s}.km-table tbody tr:hover{background:rgba(27,75,155,.1)}
.km-table td{padding:8px 10px;border-bottom:1px solid var(--border);vertical-align:middle}
.km-table .td-date{color:var(--text);font-weight:500;white-space:nowrap}
.km-table .td-conductor{color:var(--text2);max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.km-table .td-km{font-weight:600;font-variant-numeric:tabular-nums;text-align:right}
.km-table .td-delta{text-align:right;font-weight:700;font-variant-numeric:tabular-nums}
.km-table .delta-pos{color:var(--success)}.km-table .delta-neg{color:var(--danger)}.km-table .delta-zero{color:var(--text2)}
.km-table .badge-estado{font-size:.65rem;padding:2px 8px;border-radius:12px;font-weight:600}
.badge-cerrado{background:rgba(16,185,129,.12);color:#6EE7B7}
.badge-abierto{background:rgba(244,121,32,.15);color:var(--accent)}
.hist-empty{color:var(--text2);text-align:center;padding:24px;font-size:.82rem}
.hist-summary{display:flex;gap:8px;margin-bottom:14px}
.hist-chip{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:8px;text-align:center}
.hist-chip .hval{font-size:1rem;font-weight:800;line-height:1.2}
.hist-chip .hlbl{font-size:.62rem;text-transform:uppercase;letter-spacing:.5px;color:var(--text2);font-weight:600}
.hist-chip .hval-accent{color:var(--accent)}.hist-chip .hval-success{color:var(--success)}.hist-chip .hval-primary{color:#60A5FA}
.spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
#toast-container{position:fixed;bottom:24px;right:16px;z-index:9999;display:flex;flex-direction:column;gap:8px}
.toast{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;font-size:.82rem;opacity:0;transition:.3s}
.toast.show{opacity:1}.toast-success{border-color:var(--success);color:#6EE7B7}.toast-error{border-color:var(--danger);color:#FCA5A5}
.empty{color:var(--text2);text-align:center;padding:40px;font-size:.85rem}
</style>
</head>
<body>
<nav class="nav">
  <div class="nav-brand"><span>SILOG</span> SpA</div>
  <div class="nav-right">
    <button id="theme-toggle" onclick="toggleTheme()" title="Cambiar tema" style="background:var(--surface2);border:1px solid var(--border);color:var(--text);width:34px;height:34px;border-radius:8px;cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;">☀️</button>
    <button class="btn-accent" id="btn-add-v" onclick="openModal()" style="display:none">+ Agregar Vehículo</button>
    <button class="btn-back" onclick="window.location.href='dashboard.html'">← Dashboard</button>
  </div>
</nav>
<div class="main">
  <div class="page-header"><h2>🚛 Gestión de Flota</h2></div>
  <div class="fleet-grid" id="fleet-grid"><div class="empty">Cargando vehículos…</div></div>
</div>

<!-- Modal nuevo/editar vehículo -->
<div class="modal-overlay" id="modal-vehicle">
  <div class="modal">
    <h3 id="modal-title">➕ Nuevo Vehículo</h3>
    <input type="hidden" id="doc-id"/>
    <div class="row-2">
      <div class="form-row"><label>Patente</label><input class="field" id="m-patente" placeholder="KZGZ57" style="text-transform:uppercase"/></div>
      <div class="form-row"><label>Estado</label>
        <select class="field" id="m-estado">
          <option>Disponible</option><option>Mantención</option><option>En Ruta</option><option>Fuera de Servicio</option>
        </select>
      </div>
    </div>
    <div class="row-2">
      <div class="form-row"><label>Marca</label><input class="field" id="m-marca" placeholder="Renault"/></div>
      <div class="form-row"><label>Modelo</label><input class="field" id="m-modelo" placeholder="Master XL"/></div>
    </div>
    <div class="row-2">
      <div class="form-row"><label>Kilometraje</label><input class="field" type="number" id="m-km" placeholder="160000"/></div>
      <div class="form-row"><label>Próx. Revisión (km)</label><input class="field" type="number" id="m-rev" placeholder="170000"/></div>
    </div>
    <div class="row-2">
      <div class="form-row"><label>Cap. Kg</label><input class="field" type="number" id="m-kg" placeholder="2250"/></div>
      <div class="form-row"><label>Cap. m³</label><input class="field" type="number" step="0.1" id="m-m3" placeholder="13"/></div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
      <button class="btn-save" onclick="saveVehicle()">💾 Guardar</button>
    </div>
  </div>
</div>

<!-- Modal detalle historial -->
<div class="modal-overlay" id="modal-hist">
  <div class="modal" style="max-width:650px">
    <h3 id="hist-title">📋 Historial del Vehículo</h3>
    <div id="hist-content" style="max-height:60vh;overflow-y:auto"></div>
    <button class="btn-cancel" onclick="document.getElementById('modal-hist').classList.remove('open')" style="width:100%;margin-top:16px">Cerrar</button>
  </div>
</div>

<div id="toast-container"></div>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-storage-compat.js"></script>
<script src="js/firebase-config.js?v=2"></script>
<script src="js/auth.js?v=7"></script>
<script>
let _isAdmin=false, _email='';
requireAuth(async(user,data)=>{
  _email=data.correo_electronico||data.email||user.email;
  _isAdmin=isViewerRole((data.rol||data.role));
  if(_isAdmin) document.getElementById('btn-add-v').style.display='block';
  loadVehicles();
});
function getVehicleEmoji(marca, modelo) {
  const m = ((marca || '') + ' ' + (modelo || '')).toLowerCase();
  if (m.includes('renault') || m.includes('master')) return '🚐';
  if (m.includes('opel') || m.includes('combo')) return '🚙';
  if (m.includes('foton')) return '🚛';
  return '🚛';
}

async function loadVehicles(){
  const snap=await db.collection('vehiculos').get();
  const grid=document.getElementById('fleet-grid');
  if(snap.empty){grid.innerHTML='<div class="empty">No hay vehículos registrados.</div>';return;}
  grid.innerHTML='';
  snap.forEach(d=>{
    const v=d.data(); const id=d.id;
    const sc=v.estado==='Disponible'?'s-disponible':v.estado==='Mantención'?'s-mantencion':'s-otros';
    const emoji=getVehicleEmoji(v.marca, v.modelo);
    grid.innerHTML+=ScCard(v, id, sc, emoji);
  });
}

function ScCard(v, id, sc, emoji) {
  return `
    <div class="v-card">
      <div class="v-top">
        <div><div class="v-plate">${emoji} ${v.patente||'—'}</div><div class="v-model-name">${v.marca||''} ${v.modelo||''}</div></div>
        <span class="status-pill ${sc}">${v.estado||'—'}</span>
      </div>
      <div class="v-stats">
        <div class="v-stat"><div class="val">${(v.kilometraje||v.km||0).toLocaleString('es-CL')}</div><div class="lbl">km actual</div></div>
        <div class="v-stat"><div class="val">${v.capacidad_kg||0}</div><div class="lbl">cap. kg</div></div>
        <div class="v-stat"><div class="val">${v.capacidad_m_3||0}</div><div class="lbl">cap. m³</div></div>
      </div>
      <div class="v-conductor">👤 ${v.conductor||'Sin asignar'}</div>
      <div style="display:flex;gap:8px;margin-top:10px">
        <button class="btn-detail" style="flex:1" onclick="showHistory('${id}','${v.patente||''}')">📋 Historial</button>
        ${_isAdmin?`<button class="btn-detail" style="flex:1;border-color:var(--accent);color:var(--accent)" onclick="editVehicle('${id}')">✏️ Editar</button><button class="btn-detail" style="flex:1;border-color:var(--danger);color:#FCA5A5" onclick="deleteVehicle('${id}','${v.patente||''}')"> 🗑️ Eliminar</button>`:''}
      </div>
    </div>`;
}

function openModal(reset=true){
  if(reset){document.getElementById('modal-title').textContent='➕ Nuevo Vehículo';document.getElementById('doc-id').value='';['m-patente','m-marca','m-modelo'].forEach(i=>document.getElementById(i).value='');['m-km','m-rev','m-kg','m-m3'].forEach(i=>document.getElementById(i).value='');document.getElementById('m-estado').value='Disponible';}
  document.getElementById('modal-vehicle').classList.add('open');
}
function closeModal(){document.getElementById('modal-vehicle').classList.remove('open');}
async function editVehicle(id){
  const d=await db.collection('vehiculos').doc(id).get();
  if(!d.exists) return;
  const v=d.data();
  document.getElementById('doc-id').value=id;
  document.getElementById('modal-title').textContent='✏️ Editar Vehículo';
  document.getElementById('m-patente').value=v.patente||'';
  document.getElementById('m-marca').value=v.marca||'';
  document.getElementById('m-modelo').value=v.modelo||'';
  document.getElementById('m-km').value=v.kilometraje||v.km||'';
  document.getElementById('m-rev').value=v.proxima_revision||'';
  document.getElementById('m-kg').value=v.capacidad_kg||'';
  document.getElementById('m-m3').value=v.capacidad_m_3||'';
  document.getElementById('m-estado').value=v.estado||'Disponible';
  openModal(false);
}
async function saveVehicle(){
  const patente=document.getElementById('m-patente').value.trim().toUpperCase();
  if(!patente){showToast('Ingresa la patente','error');return;}
  const docId=document.getElementById('doc-id').value;
  const kmVal = parseFloat(document.getElementById('m-km').value)||0;
  const data={
    patente,marca:document.getElementById('m-marca').value.trim(),
    modelo:document.getElementById('m-modelo').value.trim(),
    kilometraje:kmVal,
    km:kmVal,
    base_km:kmVal,
    base_edited_at:firebase.firestore.FieldValue.serverTimestamp(),
    proxima_revision:parseFloat(document.getElementById('m-rev').value)||0,
    capacidad_kg:parseFloat(document.getElementById('m-kg').value)||0,
    capacidad_m_3:parseFloat(document.getElementById('m-m3').value)||0,
    estado:document.getElementById('m-estado').value,
  };
  if(!docId) data.conductor = '';
  try{
    if(docId) {
      const snap = await db.collection('vehiculos').doc(docId).get();
      const kmAnterior = snap.data()?.kilometraje || snap.data()?.km || 0;
      
      if (kmVal !== kmAnterior) {
        data.historial_vehiculo = firebase.firestore.FieldValue.arrayUnion({
          fecha: new Date().toISOString(),
          km_final: kmVal,
          km_recorridos: kmVal - kmAnterior,
          conductor: "ajuste_manual",
          ajustado_por: _email || 'admin',
          motivo: "Corrección manual odómetro"
        });
      }
      await db.collection('vehiculos').doc(docId).update(data);
    } else {
      await db.collection('vehiculos').add(data);
    }
    closeModal();showToast('✅ Vehículo guardado','success');loadVehicles();
  }catch(e){showToast('Error: '+e.message,'error');}
}
async function showHistory(id,plate){
  document.getElementById('hist-title').textContent='📋 Historial · '+plate;
  const div=document.getElementById('hist-content');
  div.innerHTML='<div style="text-align:center;padding:24px"><span class="spinner"></span> Cargando historial…</div>';
  document.getElementById('modal-hist').classList.add('open');

  try {
    // 1) Cargar turnos de este vehículo desde Firestore
    const turnosSnap = await db.collection('turnos')
      .where('patente', '==', plate.toUpperCase())
      .get();

    // Cargar mapa de nombres de conductores
    const userSnap = await db.collection('users').get();
    const nameMap = {};
    userSnap.forEach(d => {
      const u = d.data();
      const email = (u.correo_electronico || u.email || '').toLowerCase();
      const fullName = u.nombre_completo || ((u.nombre || '') + ' ' + (u.apellido || '')).trim() || u.nombre || u.name || '';
      if (email) nameMap[email] = fullName;
      nameMap[d.id] = fullName;
    });

    const turnos = [];
    turnosSnap.forEach(d => {
      const t = d.data();
      // Resolver fecha
      let fechaObj = null;
      if (t.fecha && t.fecha.toDate) fechaObj = t.fecha.toDate();
      else if (t.hora_cierre && t.hora_cierre.toDate) fechaObj = t.hora_cierre.toDate();
      else if (typeof t.fecha === 'string') {
        try { fechaObj = new Date(t.fecha); } catch(e) {}
      }

      // Resolver nombre conductor
      const email = (t.conductor_email || '').toLowerCase().trim();
      const conductorName = t.conductor_nombre || nameMap[email] || nameMap[t.conductor_uid] || email || '—';

      turnos.push({
        fecha: fechaObj,
        conductor: conductorName,
        km_inicial: t.km_inicial || t.km_inicial_actual || 0,
        km_final: t.km_final || null,
        estado: t.estado || 'desconocido',
        turno_id: d.id,
      });
    });

    // Ordenar por fecha descendente (recientes primero)
    turnos.sort((a, b) => {
      const da = a.fecha ? a.fecha.getTime() : 0;
      const db2 = b.fecha ? b.fecha.getTime() : 0;
      return db2 - da;
    });

    // 2) Cargar historial manual del vehículo
    const vehSnap = await db.collection('vehiculos').doc(id).get();
    const manualHist = vehSnap.data()?.historial_vehiculo || [];

    // 3) Calcular resumen
    const cerrados = turnos.filter(t => t.estado === 'cerrado' && t.km_final);
    const totalKm = cerrados.reduce((sum, t) => sum + Math.max(0, (t.km_final || 0) - (t.km_inicial || 0)), 0);
    const totalTurnos = cerrados.length;
    const conductoresUnicos = [...new Set(cerrados.map(t => t.conductor))];

    // 4) Renderizar
    let html = '';

    // Summary chips
    html += `<div class="hist-summary">
      <div class="hist-chip"><div class="hval hval-accent">${totalTurnos}</div><div class="hlbl">Turnos</div></div>
      <div class="hist-chip"><div class="hval hval-success">${totalKm.toLocaleString('es-CL')}</div><div class="hlbl">KM Recorridos</div></div>
      <div class="hist-chip"><div class="hval hval-primary">${conductoresUnicos.length}</div><div class="hlbl">Conductores</div></div>
    </div>`;

    // KM History table from turnos
    html += '<div class="hist-section-title">🛣️ Historial de Kilometraje</div>';

    if (turnos.length === 0) {
      html += '<div class="hist-empty">Sin registros de turnos para este vehículo.</div>';
    } else {
      html += `<table class="km-table">
        <thead><tr>
          <th>Fecha</th>
          <th>Conductor</th>
          <th style="text-align:right">KM Inicial</th>
          <th style="text-align:right">KM Final</th>
          <th style="text-align:right">Recorrido</th>
        </tr></thead><tbody>`;

      for (const t of turnos) {
        const fechaStr = t.fecha ? t.fecha.toLocaleDateString('es-CL', { day:'2-digit', month:'short', year:'numeric' }) : '—';
        const kmIni = t.km_inicial;
        const kmFin = t.km_final;
        const delta = (kmFin !== null && kmFin !== undefined) ? kmFin - kmIni : null;
        const deltaClass = delta === null ? 'delta-zero' : delta > 0 ? 'delta-pos' : delta < 0 ? 'delta-neg' : 'delta-zero';
        const deltaStr = delta !== null ? `${delta > 0 ? '+' : ''}${delta.toLocaleString('es-CL')}` : '—';
        const badgeClass = t.estado === 'cerrado' ? 'badge-cerrado' : 'badge-abierto';
        const kmFinStr = kmFin !== null && kmFin !== undefined ? kmFin.toLocaleString('es-CL') : `<span class="badge-estado ${badgeClass}">${t.estado === 'abierto' ? 'En curso' : t.estado}</span>`;

        html += `<tr>
          <td class="td-date">${fechaStr}</td>
          <td class="td-conductor" title="${sanitize(t.conductor)}">${sanitize(t.conductor)}</td>
          <td class="td-km">${kmIni.toLocaleString('es-CL')}</td>
          <td class="td-km">${kmFinStr}</td>
          <td class="td-delta ${deltaClass}">${deltaStr}</td>
        </tr>`;
      }

      html += '</tbody></table>';
    }

    // Manual adjustments section
    if (manualHist.length > 0) {
      html += '<div class="hist-section-title" style="margin-top:20px">🔧 Ajustes Manuales</div>';
      // Sort manual hist by date desc
      const sortedManual = [...manualHist].sort((a, b) => {
        const da = a.fecha ? new Date(a.fecha).getTime() : 0;
        const db2 = b.fecha ? new Date(b.fecha).getTime() : 0;
        return db2 - da;
      });
      html += sortedManual.map(e => {
        const fecha = e.fecha_evento_historial || e.fecha || '—';
        const formattedDate = (typeof fecha === 'string') ? fecha.slice(0, 10) : formatDate(fecha);
        const evento = e.evento_historial || e.motivo || 'Ajuste Manual';
        const nombre = e.nombre_evento_historial || e.conductor || e.ajustado_por || '—';
        const km = e.kilometraje_evento_historial || e.km_final || 0;
        const kmRec = e.km_recorridos !== undefined ? ` (${e.km_recorridos > 0 ? '+' : ''}${e.km_recorridos} km)` : '';
        return `<div class="hist-item"><div class="ev">🔧 ${sanitize(evento)}</div><div class="dt">📅 ${formattedDate} · 👤 ${sanitize(nombre)} · ${km.toLocaleString('es-CL')} km${kmRec}</div></div>`;
      }).join('');
    }

    div.innerHTML = html;
  } catch(e) {
    div.innerHTML = `<div class="hist-empty">Error al cargar historial: ${sanitize(e.message)}</div>`;
    console.error('showHistory error:', e);
  }
}
async function deleteVehicle(id, patente){
  if(!confirm(`¿Eliminar el vehículo ${patente}? Esta acción no se puede deshacer.`)) return;
  try{
    await db.collection('vehiculos').doc(id).delete();
    showToast('🗑️ Vehículo eliminado','success'); loadVehicles();
  }catch(e){showToast('Error: '+e.message,'error');}
}
