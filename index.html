<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Silog SpA · Iniciar Sesión</title>
  <meta name="description" content="Plataforma de Gestión Operacional — Silog SpA Transporte Última Milla Chile"/>
  <link rel="manifest" href="manifest.json"/>
  <link rel="icon" href="assets/logo.png" type="image/png"/>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"/>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    :root{
      --primary:#1B4B9B;--primary-dark:#0E2F6B;--primary-light:#2563EB;
      --accent:#F47920;--accent-dark:#C85E10;
      --bg:#060D1F;--surface:#0D1B35;--surface2:#142040;
      --text:#E8EEF8;--text2:#8A9DC0;--border:#1E3056;
      --success:#10B981;--danger:#EF4444;--warning:#F59E0B;
    }
    body{min-height:100vh;background:var(--bg);font-family:'Inter',sans-serif;color:var(--text);display:flex;align-items:center;justify-content:center;padding:16px;overflow:hidden}

    /* Fondo animado */
    .bg-orbs{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none}
    .orb{position:absolute;border-radius:50%;filter:blur(80px);opacity:.15;animation:float 8s ease-in-out infinite}
    .orb-1{width:500px;height:500px;background:var(--primary);top:-100px;left:-150px;animation-delay:0s}
    .orb-2{width:400px;height:400px;background:var(--accent);bottom:-80px;right:-100px;animation-delay:-3s}
    .orb-3{width:300px;height:300px;background:var(--primary-light);top:40%;right:10%;animation-delay:-5s}
    @keyframes float{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-30px) scale(1.05)}}

    /* Card principal */
    .login-card{
      position:relative;z-index:1;width:100%;max-width:440px;
      background:rgba(13,27,53,.85);backdrop-filter:blur(20px);
      border:1px solid var(--border);border-radius:24px;padding:40px 36px;
      box-shadow:0 24px 80px rgba(0,0,0,.5);
    }
    .logo-wrap{text-align:center;margin-bottom:28px}
    .logo-wrap img{height:60px;object-fit:contain;filter:drop-shadow(0 0 16px rgba(244,121,32,.4))}
    .logo-wrap h1{font-size:1.6rem;font-weight:800;letter-spacing:.5px;margin-top:10px}
    .logo-wrap h1 span{color:var(--accent)}
    .logo-wrap p{font-size:.8rem;color:var(--text2);margin-top:4px}

    /* Tabs */
    .tabs{display:flex;background:var(--bg);border-radius:12px;padding:4px;margin-bottom:28px;gap:4px}
    .tab-btn{flex:1;padding:10px;border:none;background:transparent;color:var(--text2);border-radius:9px;font-size:.85rem;font-weight:600;cursor:pointer;transition:.2s;font-family:'Inter',sans-serif}
    .tab-btn.active{background:var(--primary);color:#fff;box-shadow:0 4px 12px rgba(27,75,155,.4)}

    /* Form */
    .form-group{margin-bottom:16px}
    .form-group label{display:block;font-size:.78rem;font-weight:600;color:var(--text2);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
    .form-group input,.form-group select{
      width:100%;background:var(--bg);border:1px solid var(--border);
      border-radius:10px;padding:13px 14px;font-size:.9rem;color:var(--text);
      outline:none;transition:.2s;font-family:'Inter',sans-serif;
    }
    .form-group input:focus,.form-group select:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(27,75,155,.2)}
    .form-group select option{background:var(--surface)}
    .row-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}

    /* Button */
    .btn-primary{
      width:100%;padding:14px;border:none;border-radius:12px;
      background:linear-gradient(135deg,var(--primary),var(--primary-light));
      color:#fff;font-size:.95rem;font-weight:700;cursor:pointer;
      transition:.25s;letter-spacing:.3px;font-family:'Inter',sans-serif;margin-top:4px;
    }
    .btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(27,75,155,.4)}
    .btn-primary:active{transform:translateY(0)}
    .btn-primary:disabled{opacity:.5;cursor:not-allowed;transform:none}

    /* Error/success */
    .alert{padding:10px 14px;border-radius:10px;font-size:.83rem;margin-bottom:14px;display:none}
    .alert-error{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:#FCA5A5}
    .alert-success{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.3);color:#6EE7B7}

    /* Panel oculto */
    .tab-panel{display:none}
    .tab-panel.active{display:block}

    /* Divisor */
    .divider{text-align:center;color:var(--text2);font-size:.75rem;margin:10px 0;position:relative}
    .divider::before,.divider::after{content:'';position:absolute;top:50%;width:42%;height:1px;background:var(--border)}
    .divider::before{left:0}.divider::after{right:0}

    /* Spinner */
    .spinner{display:inline-block;width:18px;height:18px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:8px}
    @keyframes spin{to{transform:rotate(360deg)}}

    /* PWA badge */
    .pwa-badge{text-align:center;margin-top:20px;font-size:.72rem;color:var(--text2);display:flex;align-items:center;justify-content:center;gap:6px}
    .pwa-badge span{color:var(--accent)}
  </style>
</head>
<body>
<div class="bg-orbs">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
</div>

<div class="login-card">
  <!-- Logo -->
  <div class="logo-wrap">
    <img src="assets/logo.png" alt="Silog SpA" onerror="this.style.display='none'"/>
    <h1>SILOG <span>SpA</span></h1>
    <p>Gestión Operacional · Última Milla Chile</p>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('login')" id="tab-login">Iniciar Sesión</button>
    <button class="tab-btn" onclick="switchTab('register')" id="tab-register">Registrarme</button>
  </div>

  <!-- ─── PANEL LOGIN ─── -->
  <div class="tab-panel active" id="panel-login">
    <div class="alert alert-error" id="login-error"></div>
    <div class="form-group">
      <label>Correo Electrónico</label>
      <input type="email" id="login-email" placeholder="tu@correo.com" autocomplete="email"/>
    </div>
    <div class="form-group">
      <label>Contraseña</label>
      <input type="password" id="login-pass" placeholder="••••••••" autocomplete="current-password"
             onkeydown="if(event.key==='Enter')doLogin()"/>
    </div>
    <button class="btn-primary" id="btn-login" onclick="doLogin()">Iniciar Sesión</button>
  </div>

  <!-- ─── PANEL REGISTRO ─── -->
  <div class="tab-panel" id="panel-register">
    <div class="alert alert-error" id="reg-error"></div>
    <div class="alert alert-success" id="reg-success"></div>
    <div class="row-2">
      <div class="form-group">
        <label>Nombre</label>
        <input type="text" id="reg-nombre" placeholder="Juan Pérez"/>
      </div>
      <div class="form-group">
        <label>RUT</label>
        <input type="text" id="reg-rut" placeholder="12.345.678-9"/>
      </div>
    </div>
    <div class="form-group">
      <label>Correo Electrónico</label>
      <input type="email" id="reg-email" placeholder="tu@correo.com"/>
    </div>
    <div class="row-2">
      <div class="form-group">
        <label>Contraseña</label>
        <input type="password" id="reg-pass" placeholder="Mínimo 8 caracteres"/>
      </div>
      <div class="form-group">
        <label>Confirmar</label>
        <input type="password" id="reg-pass2" placeholder="Repite la contraseña"/>
      </div>
    </div>
    <div class="form-group">
      <label>Teléfono</label>
      <input type="tel" id="reg-tel" placeholder="+56 9 1234 5678"/>
    </div>
    <div class="form-group">
      <label>Área</label>
      <select id="reg-area">
        <option value="Operaciones">Operaciones</option>
        <option value="Distribución">Distribución</option>
        <option value="Logística">Logística</option>
        <option value="Administración">Administración</option>
      </select>
    </div>
    <button class="btn-primary" id="btn-register" onclick="doRegister()">Crear Cuenta</button>
    <p style="text-align:center;font-size:.75rem;color:var(--text2);margin-top:12px">
      Tu cuenta será activada tras revisión del administrador.
    </p>
  </div>

  <div class="pwa-badge">📱 Disponible como app · <span>Silog SpA</span></div>
</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-storage-compat.js"></script>
<script src="js/firebase-config.js"></script>
<script src="js/auth.js"></script>
<script>
  // Redirigir si ya hay sesión
  auth.onAuthStateChanged(u => { if (u) window.location.href = '/dashboard.html'; });

  function switchTab(tab) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    document.getElementById('tab-' + tab).classList.add('active');
    document.getElementById('panel-' + tab).classList.add('active');
  }

  async function doLogin() {
    const email = document.getElementById('login-email').value.trim();
    const pass  = document.getElementById('login-pass').value;
    const errEl = document.getElementById('login-error');
    const btn   = document.getElementById('btn-login');
    errEl.style.display = 'none';
    if (!email || !pass) { showErr(errEl, 'Completa todos los campos.'); return; }
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>Ingresando…';
    try {
      await auth.signInWithEmailAndPassword(email, pass);
      window.location.href = '/dashboard.html';
    } catch(e) {
      btn.disabled = false; btn.innerHTML = 'Iniciar Sesión';
      const msgs = {
        'auth/user-not-found':  'Correo no registrado.',
        'auth/wrong-password':  'Contraseña incorrecta.',
        'auth/too-many-requests':'Demasiados intentos. Intenta más tarde.',
        'auth/invalid-email':   'Correo inválido.',
      };
      showErr(errEl, msgs[e.code] || 'Error al iniciar sesión. Intenta nuevamente.');
    }
  }

  async function doRegister() {
    const nombre = document.getElementById('reg-nombre').value.trim();
    const rut    = document.getElementById('reg-rut').value.trim();
    const email  = document.getElementById('reg-email').value.trim();
    const pass   = document.getElementById('reg-pass').value;
    const pass2  = document.getElementById('reg-pass2').value;
    const tel    = document.getElementById('reg-tel').value.trim();
    const area   = document.getElementById('reg-area').value;
    const errEl  = document.getElementById('reg-error');
    const sucEl  = document.getElementById('reg-success');
    const btn    = document.getElementById('btn-register');
    errEl.style.display = 'none'; sucEl.style.display = 'none';
    if (!nombre || !rut || !email || !pass) { showErr(errEl, 'Completa todos los campos obligatorios.'); return; }
    if (pass.length < 8) { showErr(errEl, 'La contraseña debe tener mínimo 8 caracteres.'); return; }
    if (pass !== pass2)  { showErr(errEl, 'Las contraseñas no coinciden.'); return; }
    btn.disabled = true; btn.innerHTML = '<span class="spinner"></span>Registrando…';
    try {
      await registerUser(email, pass, { nombre, rut, telefono: tel, area });
      btn.disabled = false; btn.innerHTML = 'Crear Cuenta';
      sucEl.textContent = '✅ Cuenta creada. Serás redirigido al dashboard.';
      sucEl.style.display = 'block';
      setTimeout(() => window.location.href = '/dashboard.html', 1800);
    } catch(e) {
      btn.disabled = false; btn.innerHTML = 'Crear Cuenta';
      const msgs = {
        'auth/email-already-in-use': 'Este correo ya está registrado.',
        'auth/invalid-email': 'Correo inválido.',
        'auth/weak-password': 'Contraseña muy débil (mínimo 6 caracteres).',
      };
      showErr(errEl, msgs[e.code] || 'Error al registrar: ' + e.message);
    }
  }

  function showErr(el, msg) { el.textContent = msg; el.style.display = 'block'; }
</script>
</body>
</html>
