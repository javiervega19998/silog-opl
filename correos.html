<main class="page">
  <div class="page-title">Redacción de Correos</div>
  <div class="page-subtitle">Plantillas profesionales para comunicaciones operacionales</div>

  <!-- Template selector -->
  <div class="section-header"><h2 class="section-title">Plantillas Disponibles</h2></div>
  <div id="templates-grid" style="display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:24px"></div>

  <!-- Editor -->
  <div class="card" id="email-editor">
    <div style="font-size:1rem;font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:8px">
      ✉️ <span id="editor-title">Editor de Correo</span>
    </div>
    <div class="form-group">
      <label class="form-label">Para (destinatario)</label>
      <input type="email" class="form-control" id="email-to" placeholder="destinatario@empresa.cl"/>
    </div>
    <div class="form-group">
      <label class="form-label">CC (copia)</label>
      <input type="email" class="form-control" id="email-cc" placeholder="supervisor@silog.cl (opcional)"/>
    </div>
    <div class="form-group">
      <label class="form-label">Asunto</label>
      <input type="text" class="form-control" id="email-subject" placeholder="Asunto del correo"/>
    </div>
    <div class="form-group">
      <label class="form-label">Cuerpo del Correo</label>
      <textarea class="form-control" id="email-body" rows="12" style="min-height:200px"></textarea>
    </div>
    <!-- Variables helper -->
    <div id="vars-helper" style="background:rgba(27,75,155,0.1);border:1px solid rgba(27,75,155,0.3);border-radius:10px;padding:12px;margin-bottom:16px;font-size:0.78rem;color:#8899BB;display:none">
      <strong style="color:var(--text);display:block;margin-bottom:6px">📝 Completa los campos en [CORCHETES] con información real</strong>
      <span id="vars-list"></span>
    </div>
    <div style="display:flex;gap:10px;flex-wrap:wrap">
      <button class="btn btn-outline btn-sm" onclick="copyEmail()">📋 Copiar texto</button>
      <button class="btn btn-outline btn-sm" onclick="openMailto()">📤 Abrir en email</button>
      <button class="btn btn-primary btn-sm" onclick="saveEmailLog()">💾 Guardar registro</button>
      <button class="btn btn-sm" style="background:rgba(255,255,255,0.05);border:1px solid var(--border);color:var(--text-secondary)" onclick="clearEditor()">🗑️ Limpiar</button>
    </div>
  </div>

  <!-- History -->
  <div class="section-header" style="margin-top:28px">
    <h2 class="section-title">Correos Guardados</h2>
  </div>
  <div id="email-history"><div class="spinner"></div></div>
</main>

<div id="toast-container"></div>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
<script src="js/firebase-config.js"></script>
<script src="js/auth.js"></script>
<script>
const TEMPLATES = [
  {
    id: 'retraso',
    icon: '⏰',
    name: 'Aviso de Retraso',
    color: 'rgba(245,158,11,0.15)',
    subject: '[Silog SpA] Aviso de Retraso en Entrega - Pedido [NÚMERO_PEDIDO]',
    body: `Estimado/a [NOMBRE_CLIENTE],

Junto con saludar, le comunicamos que el pedido N° [NÚMERO_PEDIDO] programado para entrega el día [FECHA_PROGRAMADA] presentará un retraso debido a [MOTIVO_RETRASO].

Nueva estimación de entrega: [NUEVA_FECHA_Y_HORA]

Lamentamos los inconvenientes ocasionados y nos comprometemos a mantenerle informado sobre el estado de su envío.

Para consultas, puede comunicarse con nosotros al [TELÉFONO_CONTACTO] o al correo [EMAIL_CONTACTO].

Atentamente,
[NOMBRE_CONDUCTOR]
Operador de Entrega · Silog SpA
Transporte de Última Milla`
  },
  {
    id: 'noentrega',
    icon: '❌',
    name: 'No Entrega',
    color: 'rgba(239,68,68,0.12)',
    subject: '[Silog SpA] Intento de Entrega Fallido - Pedido [NÚMERO_PEDIDO]',
    body: `Estimado/a [NOMBRE_CLIENTE],

Le informamos que el día [FECHA] se realizó un intento de entrega del pedido N° [NÚMERO_PEDIDO] en la dirección [DIRECCIÓN_ENTREGA], sin éxito.

Motivo: [MOTIVO: No había nadie en el domicilio / Dirección incorrecta / Cliente rechazó el paquete]

Su pedido será retenido en nuestras instalaciones y se realizará un nuevo intento de entrega el día [NUEVA_FECHA]. Le pedimos que coordine su disponibilidad.

Para reprogramar o retirar en bodega: [TELÉFONO_CONTACTO]

Atentamente,
[NOMBRE_CONDUCTOR]
Operador de Entrega · Silog SpA`
  },
  {
    id: 'incidente',
    icon: '⚠️',
    name: 'Reporte Incidente',
    color: 'rgba(239,68,68,0.12)',
    subject: '[URGENTE] Reporte de Incidente - [TIPO_INCIDENTE] - [FECHA]',
    body: `Estimado equipo de supervisión,

Por medio del presente correo, informo el siguiente incidente ocurrido durante mis operaciones:

DATOS DEL INCIDENTE:
• Fecha y hora: [FECHA] a las [HORA]
• Lugar: [DIRECCIÓN_O_UBICACIÓN]
• Tipo de incidente: [TIPO]
• Descripción: [DESCRIPCIÓN_DETALLADA]

PERSONAL INVOLUCRADO:
• Conductor: [NOMBRE_CONDUCTOR]
• RUT: [RUT]
• Patente del vehículo: [PATENTE]

MEDIDAS TOMADAS:
[DESCRIBIR_ACCIONES_REALIZADAS]

ESTADO ACTUAL:
[ESTADO: Sin lesionados / Con lesionados / Daños materiales / etc.]

Adjunto fotografías del incidente para mayor referencia.

[NOMBRE_CONDUCTOR]
Operador · Silog SpA
Teléfono: [TELÉFONO]`
  },
  {
    id: 'confirmacion',
    icon: '✅',
    name: 'Confirmación Entrega',
    color: 'rgba(16,185,129,0.12)',
    subject: '[Silog SpA] Confirmación de Entrega Exitosa - Pedido [NÚMERO_PEDIDO]',
    body: `Estimado/a [NOMBRE_CLIENTE],

Nos complace informarle que el pedido N° [NÚMERO_PEDIDO] fue entregado exitosamente el día [FECHA] a las [HORA] en la dirección [DIRECCIÓN].

Resumen de entrega:
• Recibido por: [NOMBRE_RECEPTOR]
• N° de bultos: [CANTIDAD]
• Estado de la carga: [CONDICIÓN: En buen estado / etc.]

Esperamos que el servicio haya sido de su satisfacción. Si tiene alguna consulta o reclamo, puede comunicarse con nosotros.

¡Gracias por confiar en Silog SpA!

[NOMBRE_CONDUCTOR]
Operador de Entrega · Silog SpA`
  },
  {
    id: 'coordinacion',
    icon: '📅',
    name: 'Coordinación de Ruta',
    color: 'rgba(27,75,155,0.15)',
    subject: '[Silog SpA] Coordinación de Ruta - [FECHA] - [ZONA]',
    body: `Estimado supervisor [NOMBRE_SUPERVISOR],

Le informo la programación de mi ruta para el día [FECHA]:

DATOS DE RUTA:
• Zona asignada: [ZONA_REPARTO]
• Cantidad de entregas: [N_ENTREGAS] pedidos
• Hora de salida estimada: [HORA_SALIDA]
• Vehículo: [PATENTE]
• Km inicial: [KM_INICIAL]

OBSERVACIONES PREVIAS:
[OBSERVACIONES: clima, estado de vías, etc.]

Quedo disponible para comunicación al [TELÉFONO].

Saludos,
[NOMBRE_CONDUCTOR]
Operador · Silog SpA`
  },
  {
    id: 'devolucion',
    icon: '↩️',
    name: 'Aviso Devolución',
    color: 'rgba(59,130,246,0.12)',
    subject: '[Silog SpA] Aviso de Devolución - Pedido [NÚMERO_PEDIDO]',
    body: `Estimado/a [NOMBRE_CLIENTE] / Equipo de logística,

Informamos que el pedido N° [NÚMERO_PEDIDO] está siendo devuelto a origen por el siguiente motivo:

MOTIVO DE DEVOLUCIÓN: [MOTIVO]

Detalle:
• Descripción del ítem: [DESCRIPCIÓN]
• Cantidad devuelta: [CANTIDAD]
• Estado de la carga: [ESTADO]
• Fecha de devolución: [FECHA]

El paquete será ingresado a bodega el día [FECHA_INGRESO_BODEGA] para su procesamiento.

Para reagendar o realizar las gestiones correspondientes, contáctenos en [EMAIL/TELÉFONO].

Atentamente,
[NOMBRE_CONDUCTOR]
Operador · Silog SpA`
  },
];

function renderTemplates() {
  const grid = document.getElementById('templates-grid');
  grid.innerHTML = TEMPLATES.map(t => `
    <div onclick="loadTemplate('${t.id}')" style="
      background: ${t.color};
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 14px;
      cursor: pointer;
      transition: var(--transition);
      display: flex; align-items: center; gap: 10px;
    " onmouseover="this.style.transform='translateY(-2px)'" onmouseout="this.style.transform=''">
      <span style="font-size:1.5rem">${t.icon}</span>
      <span style="font-size:0.82rem;font-weight:600">${t.name}</span>
    </div>`).join('');
}

function loadTemplate(id) {
  const t = TEMPLATES.find(t => t.id === id);
  if (!t) return;
  document.getElementById('email-subject').value = t.subject;
  document.getElementById('editor-title').textContent  = t.name;

  // Replace [NOMBRE_REDACTOR] with user name
  let body = t.body;
  if (currentUserData?.name) {
    body = body.replace('[NOMBRE_CONDUCTOR]', currentUserData.name);
    body = body.replace('[NOMBRE_REDACTOR]', currentUserData.name);
  }
  document.getElementById('email-body').value = body;

  // Extract variables
  const vars = [...body.matchAll(/\[([^\]]+)\]/g)].map(m => m[1]);
  const uniqueVars = [...new Set(vars)];
  if (uniqueVars.length) {
    document.getElementById('vars-helper').style.display = 'block';
    document.getElementById('vars-list').innerHTML = uniqueVars.map(v => `<code style="background:rgba(255,255,255,0.08);padding:2px 6px;border-radius:4px;margin:2px;display:inline-block;font-size:0.75rem">[${v}]</code>`).join('');
  } else {
    document.getElementById('vars-helper').style.display = 'none';
  }
  document.getElementById('email-editor').scrollIntoView({ behavior: 'smooth', block: 'start' });
  showToast(`Plantilla "${t.name}" cargada`, 'info');
}

function copyEmail() {
  const subject = document.getElementById('email-subject').value;
  const body    = document.getElementById('email-body').value;
  const full    = `Asunto: ${subject}\n\n${body}`;
  navigator.clipboard.writeText(full).then(() => showToast('Correo copiado al portapapeles ✅', 'success'));
}

function openMailto() {
  const to      = document.getElementById('email-to').value;
  const cc      = document.getElementById('email-cc').value;
  const subject = encodeURIComponent(document.getElementById('email-subject').value);
  const body    = encodeURIComponent(document.getElementById('email-body').value);
  let url = `mailto:${to}?subject=${subject}&body=${body}`;
  if (cc) url += `&cc=${cc}`;
  window.location.href = url;
}

function clearEditor() {
  document.getElementById('email-to').value      = '';
  document.getElementById('email-cc').value      = '';
  document.getElementById('email-subject').value = '';
  document.getElementById('email-body').value    = '';
  document.getElementById('vars-helper').style.display = 'none';
  document.getElementById('editor-title').textContent  = 'Editor de Correo';
}

async function saveEmailLog() {
  const subject = document.getElementById('email-subject').value.trim();
  const body    = document.getElementById('email-body').value.trim();
  if (!subject || !body) { showToast('Completa el asunto y cuerpo antes de guardar', 'error'); return; }
  const data = {
    to:      document.getElementById('email-to').value,
    cc:      document.getElementById('email-cc').value,
    subject, body,
    sentBy:  currentUser.uid,
    senderName: currentUserData?.name || currentUser.email,
    createdAt: firebase.firestore.FieldValue.serverTimestamp(),
  };
  try {
    await db.collection('emails').add(data);
    showToast('Correo guardado en el registro ✅', 'success');
    loadHistory();
  } catch(err) { showToast('Error al guardar: ' + err.message, 'error'); }
}

async function loadHistory() {
  const snap = await db.collection('emails')
    .where('sentBy','==',currentUser.uid)
    .orderBy('createdAt','desc').limit(10).get();
  const container = document.getElementById('email-history');
  if (snap.empty) {
    container.innerHTML = `<div class="empty-state" style="padding:30px 0"><div class="empty-state-icon">✉️</div><p>No has guardado correos aún.</p></div>`;
    return;
  }
  container.innerHTML = snap.docs.map(d => {
    const e = d.data();
    return `<div class="task-item">
      <div class="task-icon" style="background:rgba(244,121,32,0.15)">✉️</div>
      <div class="task-content">
        <div class="task-title">${e.subject || '(Sin asunto)'}</div>
        <div class="task-meta">Para: ${e.to || '—'} · ${formatDate(e.createdAt)}</div>
      </div>
      <div class="task-right">
        <button class="btn btn-outline btn-sm" onclick="reloadEmail('${d.id}')">Recargar</button>
      </div>
    </div>`;
  }).join('');
}

async function reloadEmail(id) {
  const snap = await db.collection('emails').doc(id).get();
  if (!snap.exists) return;
  const e = snap.data();
  document.getElementById('email-to').value      = e.to || '';
  document.getElementById('email-cc').value      = e.cc || '';
  document.getElementById('email-subject').value = e.subject || '';
  document.getElementById('email-body').value    = e.body || '';
  document.getElementById('email-editor').scrollIntoView({ behavior: 'smooth' });
  showToast('Correo recargado', 'info');
}

requireAuth((user, userData) => {
  renderNavbar(userData);
  renderTemplates();
  loadHistory();
});
</script>
</body>
