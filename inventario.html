<main class="page">
  <div class="page-title">Gestión de Inventario</div>
  <div class="page-subtitle">Control de paquetes, stock y ubicaciones</div>

  <!-- Alert: low stock -->
  <div id="stock-alert" style="display:none;background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.25);border-radius:12px;padding:12px 16px;margin-bottom:14px;display:flex;align-items:center;gap:10px;font-size:.84rem">
    <span style="font-size:1.2rem">⚠️</span>
    <span><strong style="color:#FCA5A5" id="alert-count">0</strong> productos bajo stock mínimo</span>
    <a href="bodega.html" style="margin-left:auto;color:#F47920;font-weight:600;text-decoration:none;font-size:.82rem">WMS Bodega →</a>
  </div>

  <!-- Search + Add -->
  <div style="display:flex;gap:10px;margin-bottom:16px;align-items:center">
    <div class="search-wrap" style="flex:1;margin:0">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="search" class="search-input" id="search-inv" placeholder="Buscar por código, nombre..."/>
    </div>
    <button class="btn btn-accent btn-sm" onclick="openModal()">+ Agregar</button>
  </div>

  <!-- Import/Export toolbar -->
  <div style="display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap;align-items:center">
    <input type="file" id="import-file" accept=".xlsx,.xls,.csv" style="display:none" onchange="importExcel(event)"/>
    <button class="btn btn-outline btn-sm" onclick="document.getElementById('import-file').click()" style="font-size:.75rem">📤 Importar Excel</button>
    <button class="btn btn-outline btn-sm" onclick="exportResumen()" style="font-size:.75rem">📥 Resumen</button>
    <button class="btn btn-outline btn-sm" onclick="exportMovimientos()" style="font-size:.75rem">📥 Ing/Sal</button>
    <button class="btn btn-outline btn-sm" onclick="exportConsolidado()" style="font-size:.75rem">📥 Consolidado</button>
    <button class="btn btn-outline btn-sm" onclick="downloadPlantilla()" style="font-size:.75rem;color:#8A9DC0">📋 Plantilla</button>
  </div>

  <!-- Filter tabs -->
  <div style="display:flex;gap:8px;margin-bottom:18px;overflow-x:auto;padding-bottom:4px">
    <button class="filter-tab active" data-filter="all">Todos</button>
    <button class="filter-tab" data-filter="disponible">Disponible</button>
    <button class="filter-tab" data-filter="en_transito">En Tránsito</button>
    <button class="filter-tab" data-filter="agotado">No Disponible / Agotado</button>
    <button class="filter-tab" data-filter="entregado">Entregado</button>
  </div>

  <div id="inv-container"><div class="spinner"></div></div>
</main>

<!-- Modal: Add/Edit Item -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modal-title">Nuevo Ítem de Inventario</div>
    <form id="inv-form">
      <input type="hidden" id="item-id"/>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
        <div class="form-group">
          <label class="form-label">Código / Tracking</label>
          <input type="text" class="form-control" id="item-code" placeholder="PKG-20250001" required/>
        </div>
        <div class="form-group">
          <label class="form-label">SKU</label>
          <input type="text" class="form-control" id="item-sku" placeholder="SKU-001"/>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Nombre / Descripción</label>
        <input type="text" class="form-control" id="item-name" placeholder="Ej: Caja electrónica frágil" required/>
      </div>
      <div class="form-group">
        <label class="form-label">Código de Barras</label>
        <input type="text" class="form-control" id="item-barcode" placeholder="Ej: 7801234567890"/>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px">
        <div class="form-group">
          <label class="form-label">Cantidad</label>
          <input type="number" class="form-control" id="item-qty" min="0" value="1"/>
        </div>
        <div class="form-group">
          <label class="form-label">Stock Mín.</label>
          <input type="number" class="form-control" id="item-min" min="0" value="0" placeholder="0"/>
        </div>
        <div class="form-group">
          <label class="form-label">Unidad</label>
          <select class="form-control" id="item-unit">
            <option>Litros</option><option>Kilos</option><option>caja</option><option>pallet</option><option>sobre</option>
          </select>
        </div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
        <div class="form-group">
          <label class="form-label">Litros por Unidad</label>
          <input type="number" step="any" class="form-control" id="item-litros-por-unidad" min="0" value="0" placeholder="Ej: 1.5"/>
        </div>
        <div class="form-group">
          <label class="form-label">Kg por Unidad</label>
          <input type="number" step="any" class="form-control" id="item-kg-por-unidad" min="0" value="0" placeholder="Ej: 25"/>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Ubicación / Bodega</label>
        <input type="text" class="form-control" id="item-location" placeholder="Ej: Bodega Norte – Estante 3B"/>
      </div>
      <div class="form-group">
        <label class="form-label">Estado</label>
        <select class="form-control" id="item-status">
          <option value="disponible">Disponible</option>
          <option value="en_transito">En Tránsito</option>
          <option value="entregado">Entregado</option>
          <option value="agotado">Agotado</option>
          <option value="no_disponible">No Disponible</option>
          <option value="dañado">Dañado</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Observaciones</label>
        <textarea class="form-control" id="item-notes" rows="2" placeholder="Notas adicionales..."></textarea>
      </div>
      <div style="display:flex;gap:10px;margin-top:8px">
        <button type="button" class="btn btn-outline btn-full" onclick="closeModal()">Cancelar</button>
        <button type="submit" class="btn btn-primary btn-full" id="btn-save-inv">Guardar</button>
      </div>
    </form>
  </div>
</div>

<div id="toast-container"></div>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
<script src="js/firebase-config.js"></script>
<script src="js/auth.js"></script>
<script>
  const statusColors = {
    disponible:'badge-done', en_transito:'badge-active',
    entregado:'badge-done', agotado:'badge-danger', dañado:'badge-danger',
    no_disponible:'badge-danger'
  };
  const statusLabels = {
    disponible:'Disponible', en_transito:'En Tránsito',
    entregado:'Entregado', agotado:'Agotado', dañado:'Dañado',
    no_disponible:'No Disponible'
  };

  let allItems = [];
  let currentFilter = 'all';
  let editingId = null;
  let userRole = 'operador';

  function renderItems(items) {
    const container = document.getElementById('inv-container');
    if (!items.length) {
      container.innerHTML = `<div class="empty-state"><div class="empty-state-icon">📦</div><h3>Sin ítems</h3><p>No hay registros en esta categoría.</p></div>`;
      return;
    }

    // Override status dynamically for qty === 0 items to 'no_disponible'
    items.forEach(item => {
      if ((item.qty || item.cantidad || 0) === 0) {
        item.status = 'no_disponible';
      }
    });

    let slidedownBtn = '';
    let tableStyle = '';
    if (items.length > 10) {
      tableStyle = 'style="max-height: 520px; overflow: hidden; transition: max-height 0.5s ease-in-out; position: relative;" id="inv-table-wrap"';
      slidedownBtn = `
        <div id="slidedown-btn-wrap" style="text-align:center; margin-top:12px;">
          <button class="btn btn-outline btn-full" onclick="slideDownTable()" style="font-size:0.8rem; border-style:dashed; padding:10px; font-weight:600; color:var(--accent);">Mostrar todos los productos 👇</button>
        </div>
      `;
    }

    container.innerHTML = `
      <div class="table-wrap" ${tableStyle}>
        <table>
          <thead><tr>
            <th>Código</th><th>Nombre</th><th>Cantidad</th>
            <th>Un. Medida</th><th>Estado</th><th>Acciones</th>
          </tr></thead>
          <tbody>${items.map(item => `
            <tr>
              <td><code style="color:#F47920;font-size:0.8rem">${item.code || '—'}</code>${item.sku?`<br><span style="font-size:.68rem;color:#8A9DC0">${item.sku}</span>`:''}</td>
              <td><strong style="font-size:0.88rem">${item.name || '—'}</strong>${item.notes ? `<br><span style="font-size:0.72rem;color:#8899BB">${item.notes}</span>` : ''}</td>
              <td><b>${item.qty || 0}</b>
                ${(item.qty||0)>0 && (item.qty||0)<=3 ? '&nbsp;&nbsp;<span style="font-size:.65rem;color:#F59E0B;font-weight:600">⚠️ CRÍTICO</span>':''}
                ${(item.qty||0)===0 ? '&nbsp;&nbsp;<span style="font-size:.65rem;color:#EF4444;font-weight:600">⚠️ SIN STOCK</span>':''}
              </td>
              <td style="font-size:0.85rem;color:#8899BB;font-weight:500">${item.unit || '—'}</td>
              <td><span class="badge ${statusColors[item.status] || 'badge-pending'}">${statusLabels[item.status] || item.status}</span></td>
              <td>
                <button class="btn btn-outline btn-sm" onclick="editItem('${item.id}')" style="margin-right:4px">✏️</button>
                ${userRole === 'admin' ? `<button class="btn btn-danger btn-sm" onclick="deleteItem('${item.id}')">🗑️</button>` : ''}
              </td>
            </tr>`).join('')}
          </tbody>
        </table>
      </div>
      ${slidedownBtn}`;
  }

  window.slideDownTable = function() {
    const wrap = document.getElementById('inv-table-wrap');
    const btnWrap = document.getElementById('slidedown-btn-wrap');
    if (wrap) {
      wrap.style.maxHeight = '10000px';
    }
    if (btnWrap) {
      btnWrap.style.display = 'none';
    }
  };

  function applyFilter() {
    const q = document.getElementById('search-inv').value.toLowerCase();
    let filtered = allItems;
    
    // Override status dynamically for filtering
    filtered.forEach(i => {
      if ((i.qty || i.cantidad || 0) === 0) {
        i.status = 'no_disponible';
      }
    });

    if (currentFilter !== 'all') {
      if (currentFilter === 'agotado') {
        filtered = filtered.filter(i => i.status === 'agotado' || i.status === 'no_disponible');
      } else {
        filtered = filtered.filter(i => i.status === currentFilter);
      }
    }
    if (q) filtered = filtered.filter(i =>
      (i.code||'').toLowerCase().includes(q) ||
      (i.name||'').toLowerCase().includes(q) ||
      (i.location||'').toLowerCase().includes(q)
    );
    renderItems(filtered);
  }

  async function loadInventory() {
    const snap = await db.collection('inventory').orderBy('updatedAt','desc').get();
    allItems = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    applyFilter();
  }

  function openModal(id = null) {
    editingId = id;
    document.getElementById('modal-title').textContent = id ? 'Editar Ítem' : 'Nuevo Ítem';
    if (!id) document.getElementById('inv-form').reset();
    document.getElementById('modal-overlay').classList.add('open');
  }

  function editItem(id) {
    const item = allItems.find(i => i.id === id);
    if (!item) return;
    document.getElementById('item-id').value       = id;
    document.getElementById('item-code').value     = item.code || '';
    document.getElementById('item-sku').value      = item.sku || '';
    document.getElementById('item-name').value     = item.name || '';
    document.getElementById('item-barcode').value  = item.codigo_barras || '';
    document.getElementById('item-qty').value      = item.qty || 1;
    document.getElementById('item-min').value      = item.stock_minimo || 0;
    document.getElementById('item-unit').value     = item.unit || 'unidad';
    document.getElementById('item-litros-por-unidad').value = item.litros_por_unidad || 0;
    document.getElementById('item-kg-por-unidad').value = item.kg_por_unidad || 0;
    document.getElementById('item-location').value = item.location || '';
    document.getElementById('item-status').value   = item.status || 'disponible';
    document.getElementById('item-notes').value    = item.notes || '';
    openModal(id);
  }

  async function deleteItem(id) {
    if (!confirm('¿Eliminar este ítem del inventario?')) return;
    await db.collection('inventory').doc(id).delete();
    showToast('Ítem eliminado', 'success');
    loadInventory();
  }

  function closeModal(e) {
    if (!e || e.target === document.getElementById('modal-overlay')) {
      document.getElementById('modal-overlay').classList.remove('open');
      editingId = null;
    }
  }

  document.getElementById('inv-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('btn-save-inv');
    btn.disabled = true; btn.textContent = 'Guardando...';
    const qty = parseInt(document.getElementById('item-qty').value) || 0;
    let status = document.getElementById('item-status').value;
    if (qty === 0) status = 'no_disponible';
    
    const litrosPorUnidad = parseFloat(document.getElementById('item-litros-por-unidad').value) || 0;
    const kgPorUnidad = parseFloat(document.getElementById('item-kg-por-unidad').value) || 0;

    const data = {
      code:          document.getElementById('item-code').value.trim(),
      sku:           document.getElementById('item-sku').value.trim(),
      name:          document.getElementById('item-name').value.trim(),
      codigo_barras: document.getElementById('item-barcode').value.trim(),
      qty:           qty,
      cantidad:      qty,
      stock_minimo:  parseInt(document.getElementById('item-min').value) || 0,
      unit:          document.getElementById('item-unit').value,
      litros_por_unidad: litrosPorUnidad,
      kg_por_unidad:     kgPorUnidad,
      litros_actuales:   litrosPorUnidad * qty,
      kg_actuales:       kgPorUnidad * qty,
      location:      document.getElementById('item-location').value.trim(),
      nombre:        document.getElementById('item-name').value.trim(),
      status:        status,
      notes:         document.getElementById('item-notes').value.trim(),
      updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
      updatedBy: currentUser.uid,
    };
    try {
      if (editingId) {
        await db.collection('inventory').doc(editingId).update(data);
        showToast('Ítem actualizado ✅', 'success');
      } else {
        data.createdAt = firebase.firestore.FieldValue.serverTimestamp();
        data.createdBy = currentUser.uid;
        await db.collection('inventory').add(data);
        showToast('Ítem agregado ✅', 'success');
      }
      closeModal();
      loadInventory();
    } catch(err) {
      showToast('Error al guardar: ' + err.message, 'error');
    }
    btn.disabled = false; btn.textContent = 'Guardar';
  });

  // Filter tabs
  document.querySelectorAll('.filter-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      currentFilter = tab.dataset.filter;
      applyFilter();
    });
  });
  document.getElementById('search-inv').addEventListener('input', applyFilter);

  requireAuth((user, userData) => {
    renderNavbar(userData);
    userRole = userData.role;
    loadInventory();
    // Check low stock
    checkLowStock();
  });

  function checkLowStock(){
    try{
      let low=0;
      allItems.forEach(item=>{
        const qty = item.qty || item.cantidad || 0;
        if(qty > 0 && qty <= 3) low++;
      });
      if(low>0){
        document.getElementById('stock-alert').style.display='flex';
        document.getElementById('alert-count').textContent=low;
      } else {
        document.getElementById('stock-alert').style.display='none';
      }
    }catch(e){}
  }

  // ═══ IMPORT FROM EXCEL ═══
  async function importExcel(e){
    const file=e.target.files[0];
    if(!file){return;}
    try{
      const data=await file.arrayBuffer();
      const wb=XLSX.read(data,{type:'array'});
      
      let totalUpdated=0;
      let totalImported=0;
      let totalErrors=0;
      let totalMovs=0;
      const batch=db.batch();

      for(const sheetName of wb.SheetNames){
        const ws=wb.Sheets[sheetName];
        const rows=XLSX.utils.sheet_to_json(ws,{defval:''});
        if(!rows.length) continue;

        // Detect sheet type from columns of the first row
        const firstRow=rows[0];
        const firstRowKeys=Object.keys(firstRow).map(k=>k.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase().trim());
        const isMovements=firstRowKeys.includes('fecha de movimiento') || firstRowKeys.includes('cantidad de entrada') || firstRowKeys.includes('cantidad de salida');

        if(isMovements){
          // Movements sheet mapping
          const movColMap={
            'fecha de movimiento':'fecha_movimiento',
            'n documento':'n_documento',
            'numero documento':'n_documento',
            'codigo de producto':'code',
            'nombre de producto':'name',
            'cantidad de entrada':'cantidad_entrada',
            'cantidad de salida':'cantidad_salida',
            'cantidad en stock':'cantidad_stock',
            'valor':'valor',
            'observaciones':'observaciones',
            'obsarvaciones':'observaciones'
          };

          for(const row of rows){
            const item={};
            Object.entries(row).forEach(([k,v])=>{
              const normKey=k.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase().trim();
              const mapped=movColMap[normKey];
              if(mapped) item[mapped]=v;
            });

            if(!item.code){
              totalErrors++;
              continue;
            }

            const codeStr=String(item.code).trim();
            const codeUpper=codeStr.toUpperCase();
            const existing=allItems.find(i=>(i.code||'').toUpperCase()===codeUpper);

            let prodId='';
            let finalName=item.name||'';
            let litrosPorUnidad=0;
            let kgPorUnidad=0;

            if(existing){
              prodId=existing.id;
              finalName=existing.name||finalName;
              litrosPorUnidad=existing.litros_por_unidad||0;
              kgPorUnidad=existing.kg_por_unidad||0;
            } else {
              const newProdRef=db.collection('inventory').doc();
              prodId=newProdRef.id;
              const startStock=parseInt(item.cantidad_stock)||0;
              const newProdData={
                code:codeStr,
                name:finalName,
                nombre:finalName,
                qty:startStock,
                cantidad:startStock,
                litros_por_unidad:0,
                kg_por_unidad:0,
                litros_actuales:0,
                kg_actuales:0,
                unit:'unidad',
                status:startStock===0?'no_disponible':'disponible',
                stock_minimo:0,
                location:'',
                createdAt:firebase.firestore.FieldValue.serverTimestamp(),
                createdBy:currentUser.uid,
                updatedAt:firebase.firestore.FieldValue.serverTimestamp(),
                updatedBy:currentUser.uid
              };
              batch.set(newProdRef,newProdData);
              allItems.push({id:prodId,...newProdData});
            }

            const cantEntrada=parseInt(item.cantidad_entrada)||0;
            const cantSalida=parseInt(item.cantidad_salida)||0;
            const valor=parseFloat(item.valor)||0;
            const obs=String(item.observaciones||'').trim();
            const docNum=String(item.n_documento||'').trim();

            let tipoMov='ajuste';
            let cantMov=0;
            if(cantEntrada>0){
              tipoMov='ingreso';
              cantMov=cantEntrada;
            } else if(cantSalida>0){
              tipoMov='salida';
              cantMov=cantSalida;
            }

            let fechaDate=new Date();
            if(item.fecha_movimiento){
              const parsedD=new Date(item.fecha_movimiento);
              if(!isNaN(parsedD.getTime())){
                fechaDate=parsedD;
              }
            }

            // Create movement in movimientos_bodega
            const movRef=db.collection('movimientos_bodega').doc();
            batch.set(movRef,{
              producto_id:prodId,
              producto_nombre:finalName,
              producto_codigo:codeStr,
              tipo:tipoMov,
              cantidad:cantMov,
              valor_clp:valor,
              numero_documento:docNum,
              referencia:docNum?`Doc: ${docNum}`:(obs||'Movimiento importado'),
              observaciones:obs,
              operario_uid:currentUser.uid,
              operario_nombre:currentUserData?.name||currentUser.email,
              fecha:firebase.firestore.Timestamp.fromDate(fechaDate),
              scan_validado:false
            });
            totalMovs++;

            // Update inventory stock and recalculated metric fields
            if(item.cantidad_stock!==undefined&&item.cantidad_stock!==''){
              const newStock=parseInt(item.cantidad_stock)||0;
              const prodRef=db.collection('inventory').doc(prodId);
              batch.update(prodRef,{
                qty:newStock,
                cantidad:newStock,
                litros_actuales:litrosPorUnidad*newStock,
                kg_actuales:kgPorUnidad*newStock,
                status:newStock===0?'no_disponible':'disponible',
                updatedAt:firebase.firestore.FieldValue.serverTimestamp(),
                updatedBy:currentUser.uid
              });
              totalUpdated++;
            }
          }
        } else {
          // Stock / Inventory sheet mapping
          const colMap={
            'codigo producto':'code','codigo':'code','código':'code','code':'code','tracking':'code',
            'nombre producto':'name','nombre':'name','name':'name','producto':'name','descripcion':'name',
            'litros x unidad':'litros_por_unidad',
            'kg x unidad':'kg_por_unidad',
            'stock actual':'qty','cantidad':'qty','qty':'qty','stock':'qty',
            'litros actuales':'litros_actuales',
            'kg actuales':'kg_actuales'
          };

          for(const row of rows){
            const item={};
            Object.entries(row).forEach(([k,v])=>{
              const normKey=k.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase().trim();
              const mapped=colMap[normKey];
              if(mapped) item[mapped]=v;
            });
            
            if(!item.code && !item.name){
              totalErrors++;
              continue;
            }

            item.code = String(item.code || '').trim();
            item.name = String(item.name || '').trim();
            item.nombre = item.name;

            const qty = parseInt(item.qty) || 0;
            item.qty = qty;
            item.cantidad = qty;
            item.status = qty === 0 ? 'no_disponible' : 'disponible';

            const litrosPorUnidad = parseFloat(item.litros_por_unidad) || 0;
            item.litros_por_unidad = litrosPorUnidad;

            const kgPorUnidad = parseFloat(item.kg_por_unidad) || 0;
            item.kg_por_unidad = kgPorUnidad;

            item.litros_actuales = litrosPorUnidad * qty;
            item.kg_actuales = kgPorUnidad * qty;

            if(litrosPorUnidad > 0){
              item.unit = 'Litros';
            } else if(kgPorUnidad > 0){
              item.unit = 'Kilos';
            } else {
              item.unit = 'unidad';
            }

            const codeUpper = item.code.toUpperCase();
            const existing = allItems.find(i => (i.code || '').toUpperCase() === codeUpper);

            if(existing){
              const ref = db.collection('inventory').doc(existing.id);
              const updateData = {
                name: item.name,
                nombre: item.nombre,
                qty: item.qty,
                cantidad: item.cantidad,
                litros_por_unidad: item.litros_por_unidad,
                kg_por_unidad: item.kg_por_unidad,
                litros_actuales: item.litros_actuales,
                kg_actuales: item.kg_actuales,
                unit: item.unit,
                status: item.status,
                updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
                updatedBy: currentUser.uid
              };
              batch.update(ref, updateData);
              totalUpdated++;
            } else {
              const ref = db.collection('inventory').doc();
              const newData = {
                ...item,
                stock_minimo: 0,
                location: '',
                createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                createdBy: currentUser.uid,
                updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
                updatedBy: currentUser.uid
              };
              batch.set(ref, newData);
              totalImported++;
            }
          }
        }
      }
      await batch.commit();
      showToast(`✅ Importación completada: ${totalUpdated} stocks act., ${totalImported} prod. creados, ${totalMovs} mov. registrados${totalErrors?' ('+totalErrors+' omitidos)':''}`, 'success');
      await loadInventory();
      checkLowStock();
    }catch(err){
      showToast('Error al importar: '+err.message,'error');
    }
    e.target.value='';
  }

  // ═══ DOWNLOAD PLANTILLA ═══
  function downloadPlantilla(){
    const wb=XLSX.utils.book_new();
    const getColLetter = (colIdx) => {
      let temp, letter = '';
      while (colIdx >= 0) {
        temp = colIdx % 26;
        letter = String.fromCharCode(temp + 65) + letter;
        colIdx = Math.floor(colIdx / 26) - 1;
      }
      return letter;
    };

    // Sheet 1: Stock de Inventario
    const stockRows=[
      ['CÓDIGO PRODUCTO','NOMBRE PRODUCTO','Litros x Unidad','KG x UNIDAD','STOCK ACTUAL','LITROS ACTUALES','KG ACTUALES'],
      ['PROD-001','Aceite Lubricante 1L',1.0,0.0,150,150.0,0.0],
      ['PROD-002','Harina Industrial 25KG',0.0,25.0,40,0.0,1000.0]
    ];
    const wsStock=XLSX.utils.aoa_to_sheet(stockRows);
    wsStock['!cols']=[{wch:18},{wch:30},{wch:16},{wch:16},{wch:16},{wch:18},{wch:18}];
    
    // Style Stock Inventario headers (Row 1)
    for (let c = 0; c < stockRows[0].length; c++) {
      const ref = getColLetter(c) + '1';
      if (wsStock[ref]) {
        wsStock[ref].s = {
          font: { bold: true },
          alignment: { horizontal: 'center', vertical: 'center' }
        };
      }
    }

    XLSX.utils.book_append_sheet(wb,wsStock,'Stock Inventario');

    // Sheet 2: Movimientos
    const movRows=[
      ['FECHA DE MOVIMIENTO','N° DOCUMENTO','CODIGO DE PRODUCTO','NOMBRE DE PRODUCTO','CANTIDAD DE ENTRADA','CANTIDAD DE SALIDA','CANTIDAD EN STOCK','VALOR','OBSERVACIONES'],
      [new Date().toISOString().slice(0,10),'GD-1001','PROD-001','Aceite Lubricante 1L',50,'',200,15000,'Abastecimiento inicial'],
      [new Date().toISOString().slice(0,10),'GD-1002','PROD-002','Harina Industrial 25KG','',10,30,8000,'Despacho cliente']
    ];
    const wsMov=XLSX.utils.aoa_to_sheet(movRows);
    wsMov['!cols']=[{wch:20},{wch:15},{wch:18},{wch:30},{wch:22},{wch:22},{wch:20},{wch:12},{wch:25}];
    
    // Style Movimientos headers (Row 1)
    for (let c = 0; c < movRows[0].length; c++) {
      const ref = getColLetter(c) + '1';
      if (wsMov[ref]) {
        wsMov[ref].s = {
          font: { bold: true },
          alignment: { horizontal: 'center', vertical: 'center' }
        };
      }
    }

    XLSX.utils.book_append_sheet(wb,wsMov,'Movimientos');

    XLSX.writeFile(wb,'SILOG_Plantilla_WMS.xlsx');
  }

  function fmtD(d){return d?d.toLocaleDateString('es-CL',{year:'numeric',month:'2-digit',day:'2-digit'}):''}

  // ═══ EXPORT: Resumen Inventario ═══
  function exportResumen(){
    const rows=[['RESUMEN DE INVENTARIO - SILOG SpA','','','','',''],
      ['Fecha de generación:',new Date().toLocaleString('es-CL'),'','','',''],
      [],
      ['Código','SKU','Producto','Cantidad','Unidad','Estado','Ubicación','Stock Mínimo','Alerta']];
    const sorted=[...allItems].sort((a,b)=>(a.name||'').localeCompare(b.name||''));
    sorted.forEach(i=>{
      const alerta=(i.stock_minimo||0)>0&&(i.qty||0)<=(i.stock_minimo||0)?'⚠️ BAJO STOCK':'';
      rows.push([i.code||'',i.sku||'',i.name||'',i.qty||0,i.unit||'',statusLabels[i.status]||i.status||'',i.location||'',i.stock_minimo||0,alerta]);
    });
    // Totals
    const totalQty=allItems.reduce((s,i)=>s+(i.qty||0),0);
    const byStatus={};
    allItems.forEach(i=>{const s=i.status||'disponible';byStatus[s]=(byStatus[s]||0)+(i.qty||0);});
    rows.push([]);
    rows.push(['','','TOTAL PRODUCTOS',allItems.length,'','','','','']);
    rows.push(['','','TOTAL UNIDADES',totalQty,'','','','','']);
    Object.entries(byStatus).forEach(([s,c])=>rows.push(['','',statusLabels[s]||s,c,'','','','','']));
    dlXLSX([{name:'Resumen Inventario',data:rows}],'SILOG_Resumen_Inventario');
  }

  // ═══ EXPORT: Ingresos y Salidas ═══
  async function exportMovimientos(){
    try{
      showToast('📥 Generando reporte…','info');
      const snap=await db.collection('movimientos_bodega').get();
      const movs=[];
      snap.forEach(d=>{const m=d.data();m._date=m.fecha?.toDate?m.fecha.toDate():null;movs.push(m);});
      movs.sort((a,b)=>(a._date||0)-(b._date||0));
      const rows=[
        ['FECHA DE MOVIMIENTO','N° DOCUMENTO','CODIGO DE PRODUCTO','NOMBRE DE PRODUCTO','CANTIDAD DE ENTRADA','CANTIDAD DE SALIDA','CANTIDAD EN STOCK','VALOR','OBSERVACIONES']
      ];
      movs.forEach(m=>{
        const prod=allItems.find(p=>p.id===m.producto_id) || {};
        const isEntry=['ingreso','devolucion','abastecimiento','ajuste_pos'].includes(m.tipo);
        const qtyEntrada=isEntry ? (m.cantidad || 0) : '';
        const qtySalida=!isEntry ? (m.cantidad || 0) : '';
        rows.push([
          m._date ? m._date.toLocaleDateString('es-CL') : '',
          m.numero_documento || m.referencia || '',
          m.producto_codigo || prod.code || '',
          m.producto_nombre || prod.name || '',
          qtyEntrada,
          qtySalida,
          prod.qty !== undefined ? prod.qty : (prod.cantidad || 0),
          m.valor_clp || m.valor || 0,
          m.observaciones || ''
        ]);
      });
      dlXLSX([{name:'Movimientos',data:rows}],'SILOG_Movimientos_Inventario');
    }catch(e){showToast('Error: '+e.message,'error');}
  }

  // ═══ EXPORT: Consolidado General ═══
  async function exportConsolidado(){
    try{
      showToast('📥 Generando consolidado WMS…','info');
      
      // 1. Fetch Movements
      const movSnap=await db.collection('movimientos_bodega').get();
      const movs=[];
      movSnap.forEach(d=>{const m=d.data();m._date=m.fecha?.toDate?m.fecha.toDate():null;movs.push(m);});
      movs.sort((a,b)=>(a._date||0)-(b._date||0));
      
      // 2. Fetch Dispatches
      const despSnap=await db.collection('despachos').get();
      const desps=[];
      despSnap.forEach(d=>{const dp=d.data();dp.id=d.id;dp._date=dp.fecha?.toDate?dp.fecha.toDate():null;desps.push(dp);});
      
      // 3. Fetch Hojas de Ruta (Trips)
      const hrSnap=await db.collection('hojas_ruta').get();
      const hrMap={};
      hrSnap.forEach(d=>{hrMap[d.id]=d.data();});

      const sheets=[];

      // --- SHEET 1: Stock de Inventario ---
      const h1=[
        ['CÓDIGO PRODUCTO','NOMBRE PRODUCTO','Litros x Unidad','KG x UNIDAD','STOCK ACTUAL','LITROS ACTUALES','KG ACTUALES']
      ];
      const sorted=[...allItems].sort((a,b)=>(a.name||'').localeCompare(b.name||''));
      sorted.forEach(i=>{
        h1.push([
          i.code||'',
          i.name||'',
          i.litros_por_unidad||0,
          i.kg_por_unidad||0,
          i.qty||0,
          i.litros_actuales||0,
          i.kg_actuales||0
        ]);
      });
      sheets.push({name:'Stock Inventario',data:h1});

      // --- SHEET 2: Movimientos ---
      const h2=[
        ['FECHA DE MOVIMIENTO','N° DOCUMENTO','CODIGO DE PRODUCTO','NOMBRE DE PRODUCTO','CANTIDAD DE ENTRADA','CANTIDAD DE SALIDA','CANTIDAD EN STOCK','VALOR','OBSERVACIONES']
      ];
      movs.forEach(m=>{
        const prod=allItems.find(p=>p.id===m.producto_id) || {};
        const isEntry=['ingreso','devolucion','abastecimiento','ajuste_pos'].includes(m.tipo);
        const qtyEntrada=isEntry ? (m.cantidad || 0) : '';
        const qtySalida=!isEntry ? (m.cantidad || 0) : '';
        h2.push([
          m._date ? m._date.toLocaleDateString('es-CL') : '',
          m.numero_documento || m.referencia || '',
          m.producto_codigo || prod.code || '',
          m.producto_nombre || prod.name || '',
          qtyEntrada,
          qtySalida,
          prod.qty !== undefined ? prod.qty : (prod.cantidad || 0),
          m.valor_clp || m.valor || 0,
          m.observaciones || ''
        ]);
      });
      sheets.push({name:'Movimientos',data:h2});

      // --- SHEET 3: Status ---
      const docGroup={};
      const getDocKey=(docNum)=>String(docNum || '').trim().toUpperCase();
      
      desps.forEach(d=>{
        const docNum=d.guia_numero || d.n_documento || d.referencia;
        if(!docNum)return;
        const key=getDocKey(docNum);
        if(!docGroup[key]){
          docGroup[key]={
            docNum,
            fechaRecepcion:'',
            cliente:d.cliente_nombre||'',
            bultos:0,
            litros:0,
            kg:0,
            fechaEntrega:'',
            status:'',
            movil:'',
            conductor:'',
            comuna:d.cliente_comuna||'',
            region:d.cliente_region||d.region||'Metropolitana',
            _desps:[],
            _movs:[]
          };
        }
        const g=docGroup[key];
        g._desps.push(d);
        
        let b=parseInt(d.bultos)||parseInt(d.cantidad)||0;
        if(!b&&d.descripcion){
          const m=d.descripcion.match(/\d+/);
          if(m)b=parseInt(m[0]);
        }
        if(!b)b=1;
        g.bultos+=b;
        g.litros+=parseFloat(d.litros)||parseFloat(d.litros_total)||0;
        g.kg+=parseFloat(d.kg)||parseFloat(d.kg_total)||0;
        
        const trip=hrMap[d.turno_id]||{};
        if(trip.fecha) g.fechaEntrega=trip.fecha;
        if(trip.patente) g.movil=trip.patente;
        if(trip.conductor_nombre) g.conductor=trip.conductor_nombre;
      });

      movs.forEach(m=>{
        const docNum=m.numero_documento||m.referencia;
        if(!docNum)return;
        const key=getDocKey(docNum);
        if(!docGroup[key]){
          docGroup[key]={
            docNum,
            fechaRecepcion:'',
            cliente:m.producto_nombre||'',
            bultos:0,
            litros:0,
            kg:0,
            fechaEntrega:m._date?m._date.toLocaleDateString('es-CL'):'',
            status:'',
            movil:'',
            conductor:m.operario_nombre||'',
            comuna:m.ubicacion||'',
            region:'Metropolitana',
            _desps:[],
            _movs:[]
          };
        }
        const g=docGroup[key];
        g._movs.push(m);
        
        if(g._desps.length===0){
          g.bultos+=m.cantidad||0;
          const prod=allItems.find(p=>p.id===m.producto_id)||{};
          if(prod.litros_por_unidad) g.litros+=(prod.litros_por_unidad*(m.cantidad||0));
          if(prod.kg_por_unidad) g.kg+=(prod.kg_por_unidad*(m.cantidad||0));
          if(!g.cliente&&m.producto_nombre) g.cliente=m.producto_nombre;
        }
      });

      const h3=[
        ['N°DOCUMENTO','FECHA DE RECEPCIÓN','CLIENTE','BULTOS','LITROS','KG','FECHA DE ENTREGA','STATUS','MOVIL','CONDUCTOR','COMUNA','REGIÓN']
      ];

      Object.values(docGroup).forEach(g=>{
        let finalStatus='';
        if(g._desps.length>0){
          const hasDev=g._desps.some(d=>d.estado==='devuelto');
          const allEnt=g._desps.every(d=>d.estado==='entregado');
          if(allEnt){
            finalStatus='ENTREGADO';
          }else if(hasDev){
            const hasRechazo=g._desps.some(d=>{
              const mot=(d.devolucion_motivo||'').toLowerCase();
              return mot.includes('rechazo')||mot.includes('rechazado');
            });
            finalStatus=hasRechazo?'RECHAZADO':'DEVOLUCION';
          }else{
            finalStatus='PENDIENTE';
          }
        }else{
          const hasIng=g._movs.some(m=>['ingreso', 'devolucion', 'abastecimiento'].includes(m.tipo));
          if(hasIng) finalStatus='';
          else finalStatus='EGRESO';
        }
        h3.push([g.docNum,g.fechaRecepcion,g.cliente,g.bultos,g.litros,g.kg,g.fechaEntrega,finalStatus,g.movil,g.conductor,g.comuna,g.region]);
      });
      sheets.push({name:'Status',data:h3});

      dlXLSX(sheets,'SILOG_Consolidado_WMS');
    }catch(e){showToast('Error: '+e.message,'error');}
  }

  // ═══ XLSX HELPER ═══
  function dlXLSX(sheets,filename){
    const wb=XLSX.utils.book_new();
    sheets.forEach(s=>{
      const ws=XLSX.utils.aoa_to_sheet(s.data);
      const cols=s.data.reduce((max,row)=>Math.max(max,row.length),0);
      ws['!cols']=Array.from({length:cols},(_,ci)=>{
        let w=10;s.data.forEach(r=>{if(r[ci]!=null){const l=String(r[ci]).length;if(l>w)w=l;}});return{wch:Math.min(w+2,40)};
      });
      
      // Style headers (bold & centered)
      let headerRow = 1;
      if (s.name === 'Resumen Inventario') {
        headerRow = 4;
      }
      if (s.data && s.data.length >= headerRow && s.data[headerRow - 1]) {
        const getColLetter = (colIdx) => {
          let temp, letter = '';
          while (colIdx >= 0) {
            temp = colIdx % 26;
            letter = String.fromCharCode(temp + 65) + letter;
            colIdx = Math.floor(colIdx / 26) - 1;
          }
          return letter;
        };
        const colCount = s.data[headerRow - 1].length;
        for (let c = 0; c < colCount; c++) {
          const cellRef = getColLetter(c) + headerRow;
          if (ws[cellRef]) {
            ws[cellRef].s = {
              font: { bold: true },
              alignment: { horizontal: 'center', vertical: 'center' }
            };
          }
        }
      }

      XLSX.utils.book_append_sheet(wb,ws,s.name.slice(0,31));
    });
    XLSX.writeFile(wb,`${filename}_${new Date().toISOString().slice(0,10)}.xlsx`);
    showToast('📥 Excel descargado','success');
  }
