<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Silog SpA · Checklist Operacional</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"/>
<style>
:root{--primary:#1B4B9B;--accent:#F47920;--bg:#060D1F;--surface:#0D1B35;--surface2:#142040;--text:#E8EEF8;--text2:#8A9DC0;--border:#1E3056;--success:#10B981;--danger:#EF4444;--warning:#F59E0B;}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);font-family:'Inter',sans-serif;color:var(--text);min-height:100vh}
.nav{background:rgba(13,27,53,.95);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:0 20px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.nav-brand{font-weight:800;font-size:1rem;display:flex;align-items:center;gap:8px}
.nav-brand span{color:var(--accent)}
.btn-back{background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:7px 14px;border-radius:8px;cursor:pointer;font-size:.8rem;font-family:'Inter',sans-serif}
.main{max-width:700px;margin:0 auto;padding:20px 16px 80px}
.page-header{margin-bottom:24px}
.page-header h2{font-size:1.3rem;font-weight:700}
.page-header p{color:var(--text2);font-size:.83rem;margin-top:4px}
.section-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:20px;margin-bottom:16px}
.section-card h3{font-size:.85rem;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--accent);margin-bottom:16px;display:flex;align-items:center;gap:8px}
.check-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
@media(max-width:480px){.check-grid{grid-template-columns:1fr}}
.check-item{display:flex;align-items:center;justify-content:space-between;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 14px;gap:8px}
.check-item label{font-size:.82rem;font-weight:500;cursor:pointer;flex:1}
.toggle{position:relative;width:36px;height:20px;flex-shrink:0}
.toggle input{opacity:0;width:0;height:0;position:absolute}
.slider{position:absolute;inset:0;background:#1E3056;border-radius:24px;cursor:pointer;transition:.3s}
.slider::before{content:'';position:absolute;width:14px;height:14px;left:3px;top:3px;background:#8A9DC0;border-radius:50%;transition:.3s}
.toggle input:checked+.slider{background:var(--success)}
.toggle input:checked+.slider::before{transform:translateX(16px);background:#fff}
.select-field,.text-field{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px 12px;color:var(--text);font-size:.85rem;font-family:'Inter',sans-serif;outline:none}
.select-field:focus,.text-field:focus{border-color:var(--primary)}
.check-item .select-field{width:auto!important;min-width:105px;max-width:160px;padding:7px 10px;font-size:.8rem;appearance:auto}
.form-row{margin-bottom:12px}
.form-row label{display:block;font-size:.75rem;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}
.btn-submit{width:100%;padding:15px;border:none;border-radius:12px;background:linear-gradient(135deg,var(--primary),#2563EB);color:#fff;font-size:1rem;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;margin-top:8px;transition:.2s}
.btn-submit:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(27,75,155,.4)}
.btn-submit:disabled{opacity:.5;cursor:not-allowed;transform:none}
.history-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:8px}
.history-item .date{font-size:.75rem;color:var(--text2)}
.history-item .pat{font-size:.85rem;font-weight:600;color:var(--accent)}
.badge-ok{background:rgba(16,185,129,.15);color:#6EE7B7;padding:3px 10px;border-radius:20px;font-size:.72rem;font-weight:600}
.tab-row{display:flex;gap:8px;margin-bottom:20px}
.tab-btn{flex:1;padding:9px;border:1px solid var(--border);background:var(--surface);color:var(--text2);border-radius:8px;cursor:pointer;font-size:.82rem;font-family:'Inter',sans-serif;transition:.2s}
.tab-btn.active{background:var(--primary);border-color:var(--primary);color:#fff}
.spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
#toast-container{position:fixed;bottom:24px;right:16px;z-index:9999;display:flex;flex-direction:column;gap:8px}
.toast{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;font-size:.82rem;opacity:0;transition:.3s}
.toast.show{opacity:1}
.toast-success{border-color:var(--success);color:#6EE7B7}
.toast-error{border-color:var(--danger);color:#FCA5A5}
</style>
</head>
<body>
<nav class="nav">
  <div class="nav-brand"><span>SILOG</span> SpA</div>
  <div style="display:flex;gap:8px;align-items:center">
    <span id="user-name" style="font-size:.82rem;color:var(--text2)"></span>
    <button class="btn-back" onclick="window.location.href='dashboard.html'">← Dashboard</button>
  </div>
</nav>
<div class="main">
  <div class="page-header">
    <h2>✅ Checklist Operacional</h2>

  <div class="tab-row">

  <!-- FORMULARIO -->

        <div class="check-item"><label>Carrocería</label><select class="select-field" id="chequeo_carroseria" style="width:90px;padding:6px"><option value="" disabled selected>—</option><option>Check</option><option>Daño Menor</option><option>Daño Mayor</option></select></div>

    <div class="section-card">
      <h3>📄 Documentación</h3>

<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-storage-compat.js"></script>
<script src="js/firebase-config.js?v=2"></script>

<script src="js/logo-data.js?v=2"></script>
<script src="js/checklist-pdf.js?v=2"></script>
<script>
let _userEmail='', _userName='', _isAdmin=false, _allDocs=[];
requireAuth(async(user,data)=>{
  _userEmail = data.correo_electronico||data.email||user.email;
  _userName  = data.name||data.nombre||'';
  const role = (data.rol||data.role||'conductor').toLowerCase();
  _isAdmin   = isViewerRole(data.rol||data.role||'conductor');
  document.getElementById('user-name').textContent = _userName;
  document.getElementById('nombre_conductor').value = _userName;
  // Mostrar pestaña admin
  if(_isAdmin) document.getElementById('tb-all').style.display='block';

  // Exclusión rol administrativo (salvo Williams Vega)
  if (role === 'administrativo' && _userEmail !== 'williams.vega@silog.cl') {
    document.getElementById('tb-form').style.display = 'none';
    showTab('history');
  }

  // Pre-rellenar patente si tiene vehículo asignado
  const vs = await db.collection('vehiculos').where('conductor','==',_userEmail).limit(1).get();
  if(!vs.empty) document.getElementById('patente').value = vs.docs[0].data().patente||'';
});

function showTab(t){
  document.getElementById('tab-form').style.display = t==='form'?'block':'none';
  document.getElementById('tab-history').style.display = t==='history'?'block':'none';
  document.getElementById('tab-all').style.display = t==='all'?'block':'none';
  document.getElementById('tb-form').classList.toggle('active',t==='form');
  document.getElementById('tb-history').classList.toggle('active',t==='history');
  document.getElementById('tb-all').classList.toggle('active',t==='all');
  if(t==='history') loadHistory();
  if(t==='all') loadAllChecklists();
}

function toggleMedicamentos(on){
  document.getElementById('medicamentos-detalle').style.display=on?'block':'none';
}

function g(id){return document.getElementById(id);}
function gv(id){const el=g(id); return el.type==='checkbox'?el.checked:el.value;}

async function submitChecklist(){
  const patente=g('patente').value.trim().toUpperCase();
  if(!patente){showToast('Ingresa la patente del vehículo','error');return;}
  if(!g('consiente_responsabilidad_chequeo').checked){showToast('Debes aceptar la responsabilidad','error');return;}
  const btn=g('btn-submit');
  btn.disabled=true;btn.innerHTML='<span class="spinner"></span>Enviando…';
  try{
    const data={
      patente_chequeo:patente,
      nombre_operador:_userName,
      operador:_userEmail,
      fecha_chequeo:firebase.firestore.FieldValue.serverTimestamp(),
      nivel_combustible:gv('nivel_combustible'),
      chequeo_frenos:gv('chequeo_frenos'),
      chequeo_direccion:gv('chequeo_direccion'),
      chequeo_suspension:gv('chequeo_suspension'),
      chequeo_sistema_electrico:gv('chequeo_sistema_electrico'),
      chequeo_panel:gv('chequeo_panel'),
      chequeo_bocina:gv('chequeo_bocina'),
      chequeo_sensor_retroceso:gv('chequeo_sensor_retroceso'),
      chequeo_alarmas:gv('chequeo_alarmas'),
      chequeo_nivel_aceite:gv('chequeo_nivel_aceite'),
      chequeo_nivel_refrigerante:gv('chequeo_nivel_refrigerante'),
      chequeo_liquido_freno:gv('chequeo_liquido_freno'),
      chequeo_liquido_direccion:gv('chequeo_liquido_direccion'),
      chequeo_agua_parabrisas:gv('chequeo_agua_parabrisas'),
      chequeo_neumaticos:gv('chequeo_neumaticos'),
      chequeo_neumatico_repuesto:gv('chequeo_neumatico_repuesto'),
      chequeo_medidor_presion:gv('chequeo_medidor_presion'),
      chequeo_carroseria:gv('chequeo_carroseria'),
      chequeo_vidrios:gv('chequeo_vidrios'),
      chequeo_espejos:gv('chequeo_espejos'),
      chequeo_asientos:gv('chequeo_asientos'),
      chequeo_aseo:gv('chequeo_aseo'),
      chequeo_luces:gv('chequeo_luces'),
      chequeo_cinturon:gv('chequeo_cinturon'),
      chequeo_extintor:gv('chequeo_extintor'),
      chequeo_botiquin:gv('chequeo_botiquin'),
      chequeo_conos:gv('chequeo_conos'),
      chequeo_tacos:gv('chequeo_tacos'),
      chequeo_linterna:gv('chequeo_linterna'),
      chequeo_herramientas:gv('chequeo_herramientas'),
      chequeo_gata:gv('chequeo_gata'),
      chequeo_licencia_conductor:gv('chequeo_licencia_conductor'),
      chequeo_padron:gv('chequeo_padron'),
      chequeo_permiso_circulacion:gv('chequeo_permiso_circulacion'),
      chequeo_revision_tecnica:gv('chequeo_revision_tecnica'),
      chequeo_soap:gv('chequeo_soap'),
      chequeo_medicion_gases:gv('chequeo_medicion_gases'),
      condicion_fisica:gv('condicion_fisica'),
      descanso_operador:gv('descanso_operador'),
      salud_mental_operador:gv('salud_mental_operador'),
      medicamentos_chequeo:gv('medicamentos_chequeo'),
      medicamentos_detalle:gv('medicamentos_chequeo')?gv('medicamentos_detalle'):'',
      consiente_responsabilidad_chequeo:gv('consiente_responsabilidad_chequeo'),
      chequeo_observaciones:gv('chequeo_observaciones'),
    };
    await db.collection('chequeo_operacional').add(data);

    // Auto-completar la tarea de checklist correspondiente si existe
    try {
      const tSnap = await db.collection('tareas')
        .where('asignado_a', '==', _userEmail)
        .where('tipo', '==', 'checklist')
        .where('estado', '==', 'pendiente')
        .get();

      if (!tSnap.empty) {
        const batch = db.batch();
        tSnap.forEach(doc => {
          batch.update(doc.ref, {
            estado: 'completada',
            fecha_completado: firebase.firestore.FieldValue.serverTimestamp()
          });
        });
        await batch.commit();
        console.log('Tarea de checklist auto-completada con éxito.');
      }
    } catch(err) {
      console.warn('Error auto-completando tarea de checklist:', err);
    }

    // Notificar a administradores (tanto checklist como tarea completada)
    await db.collection('notificaciones').add({
      tipo:'checklist',
      operador:_userEmail,
      nombre_operador:_userName,
      patente:patente,
      fecha:firebase.firestore.FieldValue.serverTimestamp(),
      leida:false,
      mensaje:`El conductor ${_userName} ha realizado la tarea Checklist, ${new Date().toLocaleDateString('es-CL')}`,
    });

    try {
      await db.collection('notificaciones').add({
        tipo: 'tarea_completada',
        operador: _userEmail,
        nombre_operador: _userName,
        mensaje: `El conductor ${_userName} ha realizado la tarea Checklist, ${new Date().toLocaleDateString('es-CL')}`,
        fecha: firebase.firestore.FieldValue.serverTimestamp(),
        leida: false
      });
    } catch(err) {
      console.warn('Error creando notificación de tarea completada:', err);
    }

    showToast('✅ Checklist enviado correctamente','success');
    setTimeout(()=>window.location.href='dashboard.html',1500);
  }catch(e){
    btn.disabled=false;btn.innerHTML='✅ Enviar Checklist';
    showToast('Error al guardar: '+e.message,'error');
  }
}

async function loadHistory(){
  const snap=await db.collection('chequeo_operacional')
    .where('operador','==',_userEmail).get();
  const list=document.getElementById('history-list');
  if(snap.empty){list.innerHTML='<div style="color:var(--text2);text-align:center;padding:32px">Sin registros anteriores.</div>';return;}
  let docs=[];snap.forEach(d=>docs.push(d.data()));
  docs.sort((a,b)=>(b.fecha_chequeo?.toMillis?.()||0)-(a.fecha_chequeo?.toMillis?.()||0));
  list.innerHTML='';
  docs.slice(0,20).forEach(r=>{
    list.innerHTML+=`<div class="history-item">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
        <span class="pat">🚛 ${r.patente_chequeo||'—'}</span>
        <span class="badge-ok">✅ Completado</span>
      </div>
      <div class="date">📅 ${formatDate(r.fecha_chequeo)} · 👤 ${r.nombre_operador||'—'}</div>
      <div style="font-size:.78rem;color:var(--text2);margin-top:4px">⛽ Combustible: ${r.nivel_combustible||'—'} · 📝 ${r.chequeo_observaciones||'—'}</div>
    </div>`;
  });
}

// ── Admin: Todos los checklists ─────────────────────────────────
async function loadAllChecklists(){
  const list=document.getElementById('all-list');
  list.innerHTML='<div style="color:var(--text2);text-align:center;padding:32px"><span class="spinner"></span></div>';
  try{
    const snap=await db.collection('chequeo_operacional').limit(150).get();
    if(snap.empty){list.innerHTML='<div style="color:var(--text2);text-align:center;padding:32px">Sin checklists.</div>';return;}
    _allDocs=[];snap.forEach(d=>_allDocs.push({id:d.id,...d.data()}));
    _allDocs.sort((a,b)=>(b.fecha_chequeo?.toMillis?.()||0)-(a.fecha_chequeo?.toMillis?.()||0));
    list.innerHTML='';
    _allDocs.forEach(r=>{
      list.innerHTML+=`<div class="history-item">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
          <span class="pat">\u{1F69B} ${sanitize(r.patente_chequeo||'\u2014')}</span>
          <div style="display:flex;gap:6px">
            <button class="btn-back" style="font-size:.72rem;padding:4px 10px" onclick="dlPDF('${r.id}')">&darr; PDF</button>
            <span class="badge-ok">\u2705 Completado</span>
          </div>
        </div>
        <div class="date">\u{1F4C5} ${formatDate(r.fecha_chequeo)} \u00B7 \u{1F464} ${sanitize(r.nombre_operador||'\u2014')}</div>
        <div style="font-size:.78rem;color:var(--text2);margin-top:4px">\u26FD Combustible: ${sanitize(r.nivel_combustible||'\u2014')} \u00B7 \u{1F4DD} ${sanitize(r.chequeo_observaciones||'Sin obs.')}</div>
      </div>`;
    });
  }catch(e){list.innerHTML='<div style="color:var(--text2);text-align:center;padding:32px">Error: '+sanitize(e.message)+'</div>';}
}

function dlPDF(id){
  const r=_allDocs.find(d=>d.id===id);
  if(!r){showToast('No encontrado','error');return;}
  generateChecklistPDF(r);
}

function exportAllCSV(){
  if(!_allDocs.length){showToast('Carga la pesta\u00f1a primero','info');return;}
  exportCSV(_allDocs,'checklists_todos');
}
